plugins {
    id 'com.android.application'
}

android {
    namespace 'com.saveeditor'
    compileSdk 34

    defaultConfig {
        applicationId "com.saveeditor"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
        debug {
            applicationIdSuffix ""
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // No external dependencies — pure WebView app
}
